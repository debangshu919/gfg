version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DB_HOST: ${DB_HOST:-aws-1-ap-southeast-1.pooler.supabase.com}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres.ddmzvulqgwojyfnswvif}
      DB_PASSWORD: ${DB_PASSWORD:-Soumyajit@185}
      DB_PORT: ${DB_PORT:-5432}
      DB_SSLMODE: ${DB_SSLMODE:-require}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend

